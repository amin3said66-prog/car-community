<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background with gradient effect -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#grad1)"/>
  
  <!-- Car body (simplified sports car shape) -->
  <g transform="translate(16, 16)">
    <!-- Car body -->
    <path d="M -6 -2 L -8 -2 L -7 2 L 7 2 L 8 -2 L 6 -2 L 4 -5 L -4 -5 Z" fill="#1e293b" stroke="#f8fafc" stroke-width="0.5"/>
    
    <!-- Car window -->
    <path d="M -4 -3 L 4 -3 L 3 -1 L -3 -1 Z" fill="#e0f2fe" opacity="0.8"/>
    
    <!-- Wheels -->
    <circle cx="-5" cy="3" r="1.5" fill="#334155" stroke="#f8fafc" stroke-width="0.3"/>
    <circle cx="5" cy="3" r="1.5" fill="#334155" stroke="#f8fafc" stroke-width="0.3"/>
    
    <!-- Racing stripes -->
    <rect x="-1" y="-5" width="2" height="7" fill="#fbbf24" opacity="0.9"/>
  </g>
</svg>