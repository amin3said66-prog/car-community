@if (showShell) {
  <div class="min-h-screen flex flex-col w-full overflow-x-hidden">
    <!-- Top navigation -->
    <nav class="flex items-center gap-2 md:gap-4 px-4 md:px-8 h-16 bg-white/[.05] backdrop-blur-md border-b border-white/[.08] sticky top-0 z-[100] overflow-x-hidden">
      <a routerLink="/" class="inline-flex items-center gap-1.5 text-[1.1rem] font-extrabold gradient-text no-underline shrink-0 tracking-tight">
        <mat-icon style="font-size:1.5rem;width:1.5rem;height:1.5rem">directions_car</mat-icon>
        CarCommunity
      </a>

      <!-- Desktop links -->
      <div class="hidden md:flex gap-0.5 flex-1">
        @for (link of navLinks; track link.path) {
          <a [routerLink]="link.path" routerLinkActive="active"
             class="nav-link inline-flex items-center gap-1.5 px-3.5 py-1.5 rounded-lg text-white/60 no-underline text-sm font-medium transition-all hover:text-white hover:bg-white/[.08]">
            <mat-icon style="font-size:1.1rem;width:1.1rem;height:1.1rem">{{ link.icon }}</mat-icon>
            {{ link.label }}
          </a>
        }
      </div>

      <!-- Desktop actions -->
      <div class="hidden md:flex gap-2.5 items-center ml-auto shrink-0">
        <a routerLink="/auth/login" class="btn-outline">Login</a>
        <a routerLink="/cars/new" class="btn-gradient">
          <mat-icon>add</mat-icon> List a Car
        </a>
      </div>

      <!-- Mobile hamburger -->
      <button
        class="md:hidden flex items-center justify-center bg-transparent border-0 text-white/80 cursor-pointer ml-auto p-1.5 rounded-lg transition-colors hover:bg-white/[.08]"
        (click)="menuOpen = !menuOpen" aria-label="Toggle menu">
        <mat-icon>{{ menuOpen ? 'close' : 'menu' }}</mat-icon>
      </button>
    </nav>

    <!-- Mobile dropdown menu -->
    @if (menuOpen) {
      <div class="flex md:hidden flex-col bg-[#0a0f1e]/[.97] border-b border-white/[.08] sticky top-16 z-[99] w-full">
        @for (link of navLinks; track link.path) {
          <a [routerLink]="link.path" routerLinkActive="active"
             class="mobile-link flex items-center gap-3 px-6 py-3.5 text-white/65 no-underline text-sm border-b border-white/[.05] transition-all hover:text-white hover:bg-white/[.05]"
             (click)="menuOpen = false">
            <mat-icon style="font-size:1.25rem;width:1.25rem;height:1.25rem">{{ link.icon }}</mat-icon>
            {{ link.label }}
          </a>
        }
        <a routerLink="/auth/login"
           class="mobile-link flex items-center gap-3 px-6 py-3.5 text-white/65 no-underline text-sm transition-all hover:text-white hover:bg-white/[.05]"
           (click)="menuOpen = false">
          <mat-icon style="font-size:1.25rem;width:1.25rem;height:1.25rem">lock</mat-icon>
          Login
        </a>
      </div>
    }

    <!-- Page content -->
    <main class="flex-1 p-4 md:p-8 w-full overflow-x-hidden">
      <router-outlet />
    </main>
  </div>
} @else {
  <router-outlet />
}
