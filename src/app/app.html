@if (showShell) {
  <div class="shell">
    <nav class="shell-nav">
      <a routerLink="/" class="brand">
        <mat-icon>directions_car</mat-icon>
        CarCommunity
      </a>

      <div class="nav-links">
        @for (link of navLinks; track link.path) {
          <a [routerLink]="link.path" routerLinkActive="active" class="nav-link">
            <mat-icon>{{ link.icon }}</mat-icon>
            {{ link.label }}
          </a>
        }
      </div>

      <div class="nav-actions">
        <a routerLink="/auth/login" class="btn-outline">Login</a>
        <a routerLink="/cars/new" class="btn-gradient">
          <mat-icon>add</mat-icon> List a Car
        </a>
      </div>

      <button class="hamburger" (click)="menuOpen = !menuOpen" aria-label="Toggle menu">
        <mat-icon>{{ menuOpen ? 'close' : 'menu' }}</mat-icon>
      </button>
    </nav>

    @if (menuOpen) {
      <div class="mobile-menu">
        @for (link of navLinks; track link.path) {
          <a [routerLink]="link.path" routerLinkActive="active"
             class="mobile-link" (click)="menuOpen = false">
            <mat-icon>{{ link.icon }}</mat-icon>
            {{ link.label }}
          </a>
        }
        <a routerLink="/auth/login" class="mobile-link" (click)="menuOpen = false">
          <mat-icon>lock</mat-icon> Login
        </a>
      </div>
    }

    <main class="shell-content">
      <router-outlet />
    </main>
  </div>
} @else {
  <router-outlet />
}
