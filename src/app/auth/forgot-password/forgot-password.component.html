<div class="auth-container">
  <div class="auth-card">
    <h2 class="auth-title">Forgot Password</h2>

    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-5">
      <!-- Email -->
      <div class="flex flex-col gap-1.5">
        <label class="field-label" for="fp-email">Email</label>
        <input id="fp-email" class="field-input" type="email"
          formControlName="email" placeholder="Enter your email address" autocomplete="email" />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="field-error">
            @if (form.get('email')?.errors?.['required']) { Email is required }
            @if (form.get('email')?.errors?.['email']) { Please enter a valid email }
          </span>
        }
      </div>

      @if (message) {
        <div class="success-message-box">{{ message }}</div>
      }
      @if (error) {
        <div class="error-message">{{ error }}</div>
      }

      <div class="flex gap-3 mt-1">
        <a routerLink="/auth/login" class="btn-outline flex-1 justify-center py-2.5">Back to Login</a>
        <button class="btn-gradient flex-1 justify-center py-2.5"
          type="submit" [disabled]="form.invalid || loading">
          @if (loading) { <span class="spin-ring"></span> Sending… }
          @else { Send Reset Link }
        </button>
      </div>
    </form>
  </div>
</div>
